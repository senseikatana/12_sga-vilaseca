services:
  - type: web
    name: esinsa-sga-app
    runtime: docker
    rootDir: ./
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        fromEnv: PORT
      - key: NODE_ENV
        fromEnv: NODE_ENV
      - key: FRONTEND_URL
        fromEnv: FRONTEND_URL
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        fromEnv: OPENROUTER_MODEL
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        fromEnv: GEMINI_MODEL
      - key: GEMINI_MODEL_FALLBACK
        fromEnv: GEMINI_MODEL_FALLBACK
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: JARVIS_LOW_STOCK_THRESHOLD
        fromEnv: JARVIS_LOW_STOCK_THRESHOLD
    # Disco persistente para que la base de datos SQLite sobreviva reinicios
    disk:
      name: warehouse-db
      mountPath: /app
      sizeGB: 5
    healthCheckPath: /api/health
    plan: free
    autoDeploy: true
